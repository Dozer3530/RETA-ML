# RETA_ML conda environment (conda-forge).
#
# Create:    conda env create -f environment.yml
# Activate: conda activate reta_ml
# Update:   conda env update -f environment.yml --prune
#
# GPU: replace "cpuonly" with pytorch-cuda (e.g. pytorch-cuda=12.1) and re-create.

name: reta_ml
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10,<3.13
  - pip

  # Core scientific stack
  - numpy>=1.20
  - pandas>=1.3
  - scipy>=1.7
  - scikit-learn>=0.24

  # Geo / projection (no QGIS)
  - pyproj>=3.0
  - geopandas>=0.10
  - shapely

  # I/O
  - pyarrow>=6.0

  # PyTorch (conda-forge). CPU-only; for GPU use: pytorch and pytorch-cuda=12.1 (or 11.8)
  - pytorch-cpu>=2.0

  # Optimisation & evaluation
  - optuna
  - matplotlib
  - xgboost

  # App / reports (LOFO docx, Streamlit UI)
  - streamlit
  - plotly
  - python-docx

  # Testing
  - pytest>=6.0

  # PyTorch Geometric (pip for compatibility with conda pytorch)
  - pip:
    - torch_geometric>=2.4.0
